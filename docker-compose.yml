version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: trustfx_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trustfx
    ports:
      - "5432:5432"
    volumes:
      - trustfx_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  trustfx_pgdata:
